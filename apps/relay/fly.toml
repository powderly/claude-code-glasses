# fly.toml app configuration file generated for ccg-relay on 2026-03-28T13:44:20-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ccg-relay'
primary_region = 'sjc'

[build]

[env]
  CCG_RELAY_PORT = '9200'

[http_service]
  internal_port = 9200
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
